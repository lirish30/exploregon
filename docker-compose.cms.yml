services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exploregon_coast
    volumes:
      - cms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d exploregon_coast']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cms_pgdata:
